services:
  db:
    image: postgres:15-alpine
    container_name: scoutly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: scoutly
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: